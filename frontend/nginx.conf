server {
    listen 80;
    
    # Root directory nơi Nginx sẽ đọc các file tĩnh (build từ React)
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Quan trọng cho React Router: Mọi request đều trả về index.html để React xử lý điều hướng
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API sang backend để frontend luôn gọi cùng một path tương đối
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tối ưu cache cho các file tĩnh
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
